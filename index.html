<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentHub — Academic Life Manager</title>
    <meta name="description" content="Your all-in-one academic dashboard for managing timetables, assignments, quizzes, attendance, notes, and GPA.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===================== TOAST CONTAINER ===================== -->
    <div id="toast-container"></div>

    <!-- ===================== LOGIN PAGE ===================== -->
    <div id="login-page" class="page active">
        <div class="login-bg-mesh"></div>
        <div class="login-orb orb-1"></div>
        <div class="login-orb orb-2"></div>
        <div class="login-orb orb-3"></div>

        <div class="login-container">
            <div class="login-card">
                <!-- Brand -->
                <div class="login-brand">
                    <div class="login-logo">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                    </div>
                    <span class="login-brand-name">Student<span>Hub</span></span>
                </div>

                <h1 class="login-title">Welcome back 👋</h1>
                <p class="login-subtitle">Sign in to access your academic dashboard</p>

                <!-- Form -->
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <div class="input-wrap">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <input type="text" id="username" class="form-input" placeholder="Enter your username" required autocomplete="username">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="input-wrap">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                        </div>
                    </div>

                    <p id="login-error" class="login-error"></p>

                    <button type="submit" class="login-btn">
                        <span>Sign In</span>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </form>

                <p class="login-hint">
                    Demo — Username: <strong>student</strong> &nbsp;·&nbsp; Password: <strong>password123</strong>
                </p>
            </div>
        </div>
    </div>

    <!-- ===================== APP PAGE ===================== -->
    <div id="app-page" class="page hidden">

        <!-- Navbar -->
        <nav class="app-navbar">
            <div class="nav-brand">
                <div class="nav-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                </div>
                <span class="nav-brand-name">Student<span>Hub</span></span>
            </div>

            <div class="nav-center">
                <div id="live-clock" class="live-clock"></div>
            </div>

            <div class="nav-right">
                <button id="theme-toggle" class="theme-toggle-btn" title="Toggle dark mode" aria-label="Toggle dark mode">
                    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
                <div class="nav-user">
                    <div class="nav-avatar" id="nav-avatar">SB</div>
                    <span class="nav-username" id="nav-username">Sourav Bhatt</span>
                </div>
                <button class="logout-btn" id="logout-btn">Sign Out</button>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="app-wrapper">
            <!-- Header -->
            <div class="app-header">
                <div class="app-header-tag">
                    <svg width="8" height="8" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
                    Academic Dashboard
                </div>
                <h1>Student Academic <span>Life Manager</span></h1>
                <p>Your central hub for managing academic activities, schedules, and progress.</p>
            </div>

            <!-- Tabs -->
            <div class="tabs-wrapper">
                <div class="tabs-scroll">
                    <div id="tabs-list"></div>
                </div>
                <div id="tabs-content-area"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
