<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Academic Life Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===================== LOGIN PAGE ===================== -->
    <div id="login-page" class="page hidden">
        <div class="login-container">
            <div class="login-card">

                <!-- Brand -->
                <div class="login-brand">
                    <div class="login-logo">
                        <div class="radar-pulse"></div>
                    </div>
                    <span class="login-brand-name">Student<span style="color:var(--primary)">Hub</span></span>
                </div>

                <!-- Title -->
                <h1 class="login-title">Welcome back</h1>
                <p class="login-subtitle">Sign in to access your academic dashboard</p>

                <!-- Icon Container (kept for JS compatibility) -->
                <div id="login-icon-container" style="display:none;"></div>

                <!-- Form -->
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input type="text" id="username" class="form-input" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                    </div>

                    <p id="login-error" class="login-error"></p>

                    <button type="submit" class="login-btn">Sign In →</button>
                </form>

                <p class="login-hint">
                    Demo credentials — Username: <strong>student</strong> · Password: <strong>password123</strong>
                </p>
            </div>
        </div>
    </div>

    <!-- ===================== APP PAGE ===================== -->
    <div id="app-page" class="page hidden">

        <!-- Navbar -->
        <nav class="app-navbar">
            <div class="nav-brand">
                <div class="nav-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M12 6a6 6 0 0 1 0 12"/></svg>
                </div>
                <span class="nav-brand-name">Student<span>Hub</span></span>
            </div>
            <div class="nav-right">
                <div class="nav-user">
                    <div class="nav-avatar">SB</div>
                    <span class="nav-username">Sourav Bhatt</span>
                </div>
                <button class="logout-btn" id="logout-btn">Sign Out</button>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="app-wrapper">

            <!-- Header -->
            <div class="app-header">
                <div class="app-header-tag">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
                    Academic Dashboard
                </div>
                <h1>Student Academic <span>Life Manager</span></h1>
                <p>Your central hub for managing academic activities, schedules, and progress.</p>
            </div>

            <!-- Tabs -->
            <div class="tabs-wrapper">
                <div class="tabs-scroll">
                    <div id="tabs-list"></div>
                </div>
                <div id="tabs-content-area"></div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
